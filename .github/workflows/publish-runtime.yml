name: Publish @dragonflowio/agent-runtime

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -F @dragonflowio/agent-runtime typecheck

      - name: Test
        run: pnpm -F @dragonflowio/agent-runtime test

      - name: Build
        run: pnpm -F @dragonflowio/agent-runtime build

      - name: Publish to npm (public)
        run: npm publish --access public --provenance
        working-directory: packages/runtime
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
